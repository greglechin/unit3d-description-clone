name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Prepare config file
        run: cp unit3d-description-clone.ini.default unit3d-description-clone.ini

      - name: Publish self-contained linux-x64
        run: |
          dotnet publish \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            --output ./publish
          cd publish
          zip ../unit3d-description-clone-linux-x64.zip unit3d-description-clone libSkiaSharp.so unit3d-description-clone.ini

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit3d-description-clone-linux-x64
          path: ./unit3d-description-clone-linux-x64.zip

      - name: Create dev release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          files: ./unit3d-description-clone-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
